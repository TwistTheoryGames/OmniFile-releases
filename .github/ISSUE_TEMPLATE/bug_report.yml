name: Bug Report
description: Report a bug in OmniFile
labels: ["bug"]
body:
  - type: dropdown
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open OmniFile
        2. Search for "..."
        3. Click on "..."
        4. See error
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Which feature area?
      options:
        - Local file search
        - Google Drive integration
        - Dropbox integration
        - Box integration
        - SharePoint / OneDrive integration
        - Slack integration
        - Notion integration
        - GitHub integration
        - Cloud service authentication
        - File indexing
        - Workspaces
        - UI/UX
        - Other
    validations:
      required: true
  - type: input
    attributes:
      label: OmniFile version
      placeholder: e.g. 0.1.1
  - type: input
    attributes:
      label: OS version
      placeholder: e.g. macOS 15.3, Windows 11 24H2
